<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MemBridge — connected</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0d10;
    --bg-soft: #11151a;
    --border: #1f2630;
    --text: #e6edf3;
    --text-dim: #8b97a5;
    --accent: #7c5cff;
    --accent-2: #34e2c4;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 40px 100px -40px rgba(124,92,255,0.2);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 16px var(--accent);
  }
  .logo span { font-weight: 700; font-size: 1rem; }
  .check-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(52,226,196,0.15), rgba(124,92,255,0.15));
    border: 1px solid rgba(52,226,196,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 22px;
  }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .subtitle { color: var(--text-dim); font-size: 0.92rem; margin-bottom: 32px; }
  .subtitle strong { color: var(--accent-2); }
  .label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .key-box {
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 24px;
  }
  .key-value {
    font-family: var(--mono);
    font-size: 0.82rem;
    color: var(--accent-2);
    word-break: break-all;
    padding-right: 72px;
    line-height: 1.5;
  }
  .copy-btn {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: var(--mono);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--accent-2); color: var(--accent-2); }
  .copy-btn.copied { border-color: var(--accent-2); color: var(--accent-2); }
  .cmd-box {
    position: relative;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .cmd-bar {
    background: rgba(31,38,48,0.6);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    font-size: 0.72rem;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  .cmd-body {
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 0.84rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 80px;
  }
  .cmd-prompt { color: var(--accent); }
  .cmd-copy {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-20%);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 0.72rem;
    font-family: var(--mono);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cmd-copy:hover { border-color: var(--accent-2); color: var(--accent-2); }
  .cmd-copy.copied { border-color: var(--accent-2); color: var(--accent-2); }
  .warning {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: rgba(255,189,46,0.06);
    border: 1px solid rgba(255,189,46,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 0.82rem;
    color: #e8c76a;
    line-height: 1.5;
  }
  .warning-icon { flex-shrink: 0; margin-top: 1px; }
  .footer-link {
    margin-top: 24px;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-dim);
  }
  .footer-link a { color: var(--accent-2); text-decoration: none; }
  .footer-link a:hover { text-decoration: underline; }
  .logout-btn {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 8px;
    color: #ff6b6b;
    font-size: 0.82rem;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }
  .logout-btn:hover { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.5); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="dot"></div>
    <span>MemBridge</span>
  </div>

  <div class="check-icon">&#10003;</div>
  <h1>You're connected</h1>
  <p class="subtitle">Signed in as <strong>{{user}}</strong>. Save your API key — it won't be shown again.</p>

  <p class="label">API Key</p>
  <div class="key-box">
    <div class="key-value" id="key-val">{{key}}</div>
    <button class="copy-btn" onclick="copyText('key-val', this)">copy</button>
  </div>

  <p class="label">Configure CLI</p>
  <div class="cmd-box">
    <div class="cmd-bar">terminal</div>
    <div class="cmd-body">
      <span class="cmd-prompt">$</span>
      <span id="cmd-val">{{configCmd}}</span>
    </div>
    <button class="cmd-copy" onclick="copyText('cmd-val', this)">copy</button>
  </div>

  <div class="warning">
    <span class="warning-icon">&#9888;</span>
    <span>This key is shown <strong>once</strong> and not stored by MemBridge. If lost, generate a new one via <code>memb login</code>.</span>
  </div>

  <form method="POST" action="/auth/revoke" onsubmit="return confirm('Revoke this API key? You will need to login again.')">
    <input type="hidden" name="csrf_token" value="{{csrfToken}}">
    <input type="hidden" name="key" value="{{key}}">
    <button type="submit" class="logout-btn">Revoke key &amp; logout</button>
  </form>

  <div class="footer-link">
    <a href="https://github.com/TidyMaze/membridge">GitHub</a> &middot; <a href="/">Docs</a>
  </div>
</div>
<script>
function copyText(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
