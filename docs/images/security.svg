<svg viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" fill="none">
<defs>
  <linearGradient id="sfill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#34e2c4" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#34e2c4" stop-opacity="0.02"/>
  </linearGradient>
  <linearGradient id="dfill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#7c5cff" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.03"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="680" height="260" rx="14" fill="#0c0e14" stroke="#1a2030" stroke-width="1.2"/>
<!-- Centre divider -->
<line x1="340" y1="18" x2="340" y2="242" stroke="#1f2838" stroke-width="1"/>

<!-- ═══ LEFT: IN TRANSIT ═══ -->
<text x="170" y="40" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9.5" letter-spacing="0.07em" fill="#8b97a5">IN TRANSIT</text>

<!-- Shield — proper pentagon -->
<path d="M170 58 L210 74 L210 128 C210 156 170 172 170 172 C170 172 130 156 130 128 L130 74 Z"
  fill="url(#sfill)" stroke="#34e2c4" stroke-width="1.6" stroke-linejoin="round"/>
<!-- Inner shield ring (dashed) -->
<path d="M170 66 L204 80 L204 128 C204 150 170 165 170 165 C170 165 136 150 136 128 L136 80 Z"
  fill="none" stroke="#34e2c4" stroke-width="0.7" stroke-dasharray="4 5" opacity="0.25"/>

<!-- Lock inside shield -->
<rect x="160" y="110" width="20" height="18" rx="4.5" fill="#34e2c4" opacity="0.8"/>
<path d="M163 110 L163 103 C163 95 177 95 177 103 L177 110" stroke="#34e2c4" stroke-width="2.2" stroke-linecap="round"/>
<circle cx="170" cy="118" r="3" fill="#0c0e14" opacity="0.85"/>
<rect x="168.5" y="120" width="3" height="5" rx="1.5" fill="#0c0e14" opacity="0.85"/>

<!-- Data nodes + flow -->
<rect x="22" y="110" width="68" height="22" rx="11" fill="#0f1219" stroke="#242c38" stroke-width="1"/>
<text x="56" y="125" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9" fill="#8b97a5">data</text>
<line x1="92" y1="121" x2="128" y2="121" stroke="#34e2c4" stroke-width="1.8" opacity="0.65"/>
<polygon points="122,115 130,121 122,127" fill="#34e2c4" opacity="0.65"/>

<rect x="210" y="110" width="68" height="22" rx="11" fill="#0f1219" stroke="#242c38" stroke-width="1"/>
<text x="244" y="125" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9" fill="#8b97a5">data</text>
<line x1="210" y1="121" x2="174" y2="121" stroke="#34e2c4" stroke-width="1.8" opacity="0.45"/>
<polygon points="180,115 172,121 180,127" fill="#34e2c4" opacity="0.45"/>

<!-- Caption below -->
<text x="170" y="210" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="10" fill="#34e2c4" opacity="0.7">TLS 1.3</text>
<text x="170" y="226" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9"  fill="#8b97a5">OAuth 2.1 · PKCE</text>

<!-- ═══ RIGHT: AT REST ═══ -->
<text x="510" y="40" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9.5" letter-spacing="0.07em" fill="#8b97a5">AT REST</text>

<!-- Database cylinder: body → sides → bottom ellipse → top ellipse -->
<rect x="428" y="72" width="164" height="118" fill="#12152a"/>
<line x1="428" y1="72" x2="428" y2="190" stroke="#7c5cff" stroke-width="1.4" opacity="0.6"/>
<line x1="592" y1="72" x2="592" y2="190" stroke="#7c5cff" stroke-width="1.4" opacity="0.6"/>
<ellipse cx="510" cy="190" rx="82" ry="20" fill="#12152a" stroke="#7c5cff" stroke-width="1.4" opacity="0.65"/>
<ellipse cx="510" cy="72"  rx="82" ry="20" fill="#12152a" stroke="#7c5cff" stroke-width="1.4" opacity="0.8"/>
