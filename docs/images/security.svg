<text x="440" y="90"  font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.5">a9f2·e3c4·8d1b·07f5</text>
<text x="444" y="104" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.3">f03c·7e91·d25a·88b2</text>
<text x="440" y="118" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.5">2b5f·e8c1·40d9·63ae</text>
<text x="444" y="132" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.3">b17e·9a04·c5f2·31d8</text>
<text x="440" y="146" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.5">7d3a·e0b8·56cf·2e4f</text>
<text x="444" y="160" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.3">4c8f·1d7e·a390·b5c1</text>
<text x="440" y="174" font-family="monospace" font-size="8.5" fill="#7c5cff" opacity="0.5">9e6b·3f2d·c741·08a5</text>

<!-- Lock overlay -->
<circle cx="510" cy="131" r="24" fill="#0c0e14" stroke="#7c5cff" stroke-width="1.4" opacity="0.9"/>
<rect x="499" y="128" width="22" height="18" rx="5" fill="#7c5cff" opacity="0.85"/>
<path d="M502 128 L502 121 C502 113 518 113 518 121 L518 128" stroke="#7c5cff" stroke-width="2.2" stroke-linecap="round" opacity="0.7"/>
<circle cx="510" cy="136" r="3" fill="#0c0e14" opacity="0.9"/>
<rect x="508.5" y="138" width="3" height="5" rx="1.5" fill="#0c0e14" opacity="0.9"/>

<!-- Caption below -->
<text x="510" y="210" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="10" fill="#7c5cff" opacity="0.7">age ciphertext</text>
<text x="510" y="226" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="9"  fill="#8b97a5">server never sees plaintext</text>
</svg>
